<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Genesys Service Checker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Genesys Service Checker</h1>
    </header>

    <section class="card">
      <div class="toolbar">
        <div>
          <strong>Status:</strong>
          <span id="authStatus" class="status-pill status-idle">Not signed in</span>
        </div>
        <div class="toolbar-actions">
          <button id="loginBtn" type="button">Sign in</button>
          <button id="logoutBtn" type="button" class="secondary">Sign out</button>
          <button id="clearBtn" type="button" class="secondary">Clear output</button>
        </div>
      </div>

      <form id="checkerForm" class="form-grid">
        <label>
          <span>Country</span>
          <select id="country" required>
            <option value="">Select a country</option>
          </select>
        </label>

        <label>
          <span>Service</span>
          <input id="service" name="service" type="text" placeholder="Enter the service row key" required autocomplete="off">
        </label>

        <div class="form-actions">
          <button id="runBtn" type="submit">Start process</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="output-header">
        <h2>Output</h2>
        <span id="summary" class="summary"></span>
      </div>
      <div id="output" class="output" aria-live="polite"></div>
    </section>
<section class="card">
  <div class="output-header">
    <h2>Bulk tools</h2>
  </div>

  <div class="tabs" data-tabs>
    <div class="tabs-nav" role="tablist" aria-label="Bulk functionalities">
      <button
        type="button"
        class="tab-btn active"
        role="tab"
        id="tab-btn-users"
        aria-selected="true"
        aria-controls="tab-users"
        data-tab-target="tab-users"
      >
        Bulk users
      </button>

      <button
        type="button"
        class="tab-btn"
        role="tab"
        id="tab-btn-schedules"
        aria-selected="false"
        aria-controls="tab-schedules"
        data-tab-target="tab-schedules"
      >
        Bulk schedules
      </button>
    </div>

    <div
      id="tab-users"
      class="tab-panel active"
      role="tabpanel"
      aria-labelledby="tab-btn-users"
    >
      <form id="csvForm" class="form-grid">
        <label class="form-span-all">
          <span>CSV file</span>
          <input id="csvFile" name="csvFile" type="file" accept=".csv,text/csv" required>
        </label>

        <div class="form-actions">
          <button id="runCsvBtn" type="submit">Process CSV</button>
        </div>
      </form>

      <p class="section-note">
        Expected headers: <code>Email</code> and <code>Matricula</code>.
      </p>
    </div>

    <div
      id="tab-schedules"
      class="tab-panel"
      role="tabpanel"
      aria-labelledby="tab-btn-schedules"
      hidden
    >
      <form id="scheduleCsvForm" class="form-grid">
        <label class="form-span-all">
          <span>CSV file</span>
          <input id="scheduleCsvFile" name="scheduleCsvFile" type="file" accept=".csv,text/csv" required>
        </label>

        <div class="form-actions">
          <button id="runScheduleCsvBtn" type="submit">Process schedules CSV</button>
        </div>
      </form>

      <p class="section-note">
        Expected headers: <code>Division</code>, <code>Schedule</code>, <code>Nombre</code>.
        Format for <code>Schedule</code>: <code>monday-friday:0900-1800</code> or <code>sunday:1000-1400</code>.
        No blank spaces
      </p>
    </div>
  </div>
</section>
    
  </main>

<script src="config.js?v=4"></script>
<script src="app.js?v=4"></script>
</body>
</html>
